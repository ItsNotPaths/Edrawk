name: Release
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        type: string
      notes:
        description: 'Release notes / body'
        required: false
        type: string
        default: ''
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false

env:
  PROJECT_NAME: edrawk

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - flavor: x11
            bin: edrawk
            nim_define: ''
            apt_packages: 'libx11-dev libfreetype-dev fontconfig'
          - flavor: wayland
            bin: edrawk-wayland
            nim_define: '-d:wayland'
            apt_packages: 'libwayland-dev libxkbcommon-dev libfreetype-dev fontconfig'
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: '2.0.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve dep HEADs
        # Cache key alone (download-deps.sh hash) doesn't change when our
        # vendored repos move forward, which baked a pre-fix wayluigi into
        # earlier releases. Hash the remote HEADs into the key so any dep
        # update invalidates the cache and triggers a fresh fetch.
        id: dep-heads
        run: |
          luigi_sha=$(git ls-remote https://github.com/ItsNotPaths/wayluigi.git HEAD | cut -f1)
          rl_sha=$(git ls-remote https://github.com/ItsNotPaths/rawk-luigi.git HEAD | cut -f1)
          rb_sha=$(git ls-remote https://github.com/ItsNotPaths/rawk-bufferlib.git HEAD | cut -f1)
          echo "key=${luigi_sha:0:12}-${rl_sha:0:12}-${rb_sha:0:12}" >> "$GITHUB_OUTPUT"

      - name: Cache vendor/
        uses: actions/cache@v4
        with:
          path: vendor
          key: vendor-linux-${{ hashFiles('download-deps.sh') }}-${{ steps.dep-heads.outputs.key }}

      - name: Download deps
        run: |
          chmod +x ./download-deps.sh
          ./download-deps.sh

      - name: Install ${{ matrix.flavor }} dev headers
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt_packages }}

      - name: Install freetype Nim package
        run: nimble install -y freetype@0.1.2

      - name: Build (${{ matrix.flavor }})
        # Mirrors release.sh's --local flag set. Same trim spec the rawk
        # suite (Prawk/Exrawk) uses:
        #   -d:danger          — drops bounds/nil/overflow checks. Edrawk's
        #                        writes go through saveAtomic (rawk-bufferlib
        #                        editor.nim) so a silent crash can't corrupt
        #                        files on disk.
        #   -d:noSignalHandler — no Nim SIGSEGV/SIGINT handler (~3 KB).
        #   --threads:off      — we never createThread.
        #   --panics:on        — exceptions → panics; smaller .text.
        #   --stackTrace:off /
        #     --lineTrace:off  — drop file:line strings in tracebacks.
        #   -fno-stack-protector / -Wl,-z,norelro — desktop tool, not a
        #                        network daemon; canary + relro aren't
        #                        material here and trim a few KB each.
        run: |
          nim c --opt:size -d:danger -d:strip -d:lto \
                -d:noSignalHandler \
                --threads:off --panics:on \
                --stackTrace:off --lineTrace:off \
                ${{ matrix.nim_define }} \
                --passC:-fno-pie --passL:-no-pie \
                --passC:-ffunction-sections --passC:-fdata-sections \
                --passC:-fno-asynchronous-unwind-tables \
                --passC:-fno-unwind-tables \
                --passC:-fno-stack-protector \
                --passL:-Wl,--gc-sections \
                --passL:-Wl,--build-id=none \
                --passL:-Wl,-z,norelro \
                --out:"${{ matrix.bin }}" src/edrawk.nim
          strip --strip-all "${{ matrix.bin }}" || true

      - name: Size guard (<=400 KB)
        # Edrawk is the standalone editor — no parsetoml or tab/bookmark
        # state machinery — so it should fit well under the 500 KB the
        # workflow used to budget for. Tighten to surface regressions.
        run: |
          BYTES=$(stat -c%s "${{ matrix.bin }}")
          echo "binary size: ${BYTES}"
          if [ "$BYTES" -gt 409600 ]; then
            echo "binary exceeds 400 KB budget (${BYTES} > 409600)" >&2
            exit 1
          fi

      - name: Stage artifacts
        run: |
          mkdir -p dist
          cp "${{ matrix.bin }}" dist/
          [ -f README.md ]      && cp README.md      dist/ || true
          [ -f gpl-3.0.txt ]    && cp gpl-3.0.txt    dist/ || true
          [ -f config.example ] && cp config.example dist/ || true
          [ -d themes ]         && cp -R themes      dist/ || true

      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.flavor }}
          path: dist

  release:
    needs: [build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: linux-x11
          path: linux-x11

      - uses: actions/download-artifact@v4
        with:
          name: linux-wayland
          path: linux-wayland

      - name: Package
        run: |
          # actions/upload-artifact strips the exec bit on upload, so the
          # downloaded trees come back mode 644. Restore +x on the binaries
          # before zipping or users get 126 (Permission denied) on launch.
          chmod +x "linux-x11/${PROJECT_NAME}" "linux-wayland/${PROJECT_NAME}-wayland"
          (cd linux-x11     && zip -r "../${PROJECT_NAME}-linux-x11.zip"     .)
          (cd linux-wayland && zip -r "../${PROJECT_NAME}-linux-wayland.zip" .)

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PRERELEASE_FLAG=""
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "${{ inputs.version }}" \
              "${PROJECT_NAME}-linux-x11.zip" \
              "${PROJECT_NAME}-linux-wayland.zip" \
              --repo "${{ github.repository }}" \
              --title "${{ inputs.version }}" \
              --notes "${{ inputs.notes }}" \
              $PRERELEASE_FLAG
